<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Restaurant Locator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      background-color: #2c3e50;
      color: white;
      padding: 30px 20px;
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
    }

    .search-box {
      background-color: white;
      padding: 25px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    .search-form {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .input-group {
      flex: 1;
      min-width: 200px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 16px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #3498db;
    }

    button {
      padding: 12px 32px;
      background-color: #3498db;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: background-color 0.3s;
      min-width: 120px;
    }

    button:hover {
      background-color: #2980b9;
    }

    button:active {
      transform: translateY(1px);
    }

    #map {
      width: 100%;
      height: 500px;
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .results-info {
      background-color: #ecf0f1;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
      text-align: center;
      display: none;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 15px;
      }

      header {
        padding: 20px 15px;
      }

      h1 {
        font-size: 24px;
      }

      .search-box {
        padding: 20px;
      }

      .search-form {
        flex-direction: column;
      }

      .input-group {
        min-width: 100%;
      }

      button {
        width: 100%;
      }

      #map {
        height: 400px;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 15px 10px;
      }

      h1 {
        font-size: 20px;
      }

      .search-box {
        padding: 15px;
      }

      #map {
        height: 350px;
      }
    }
  </style>
</head>
<body>
<header>
  <h1>Restaurant Locator</h1>
</header>

<div class="container">
  <div class="search-box">
    <form class="search-form" onsubmit="return false;">
      <div class="input-group">
        <input
                type="text"
                id="zip"
                placeholder="Enter zip code"
                autocomplete="postal-code"
        >
      </div>
      <button type="button" id="search">Search</button>
    </form>
  </div>

  <div class="results-info" id="resultsInfo"></div>

  <div id="map"></div>
</div>

<script type="text/javascript">
  function initMap() {
    // Default center location
    const defaultCenter = { lat: -28.5, lng: 24.5 };

    // Initialize map
    const map = new google.maps.Map(document.getElementById("map"), {
      zoom: 6,
      center: defaultCenter,
      styles: [] // Clean default style
    });

    const updateMap = async () => {
      const zip = document.getElementById('zip').value.trim();
      const resultsInfo = document.getElementById('resultsInfo');

      if (!zip) {
        resultsInfo.style.display = 'block';
        resultsInfo.style.backgroundColor = '#e74c3c';
        resultsInfo.style.color = 'white';
        resultsInfo.textContent = 'Please enter a zip code';
        return;
      }

      try {
        const uri = `http://localhost:8080/geo/${zip}`;
        const response = await fetch(uri);
        const arr = await response.json();

        if (arr.length > 0) {
          map.setZoom(12);
          map.setCenter({
            lat: arr[0].latitude,
            lng: arr[0].longitude
          });

          // Clear existing markers (optional - add marker array if needed)
          arr.forEach(r => {
            new google.maps.Marker({
              position: { lat: r.latitude, lng: r.longitude },
              map: map,
              title: r.name,
              animation: google.maps.Animation.DROP
            });
          });

          resultsInfo.style.display = 'block';
          resultsInfo.style.backgroundColor = '#27ae60';
          resultsInfo.style.color = 'white';
          resultsInfo.textContent = `Found ${arr.length} restaurant${arr.length > 1 ? 's' : ''}`;
        } else {
          resultsInfo.style.display = 'block';
          resultsInfo.style.backgroundColor = '#f39c12';
          resultsInfo.style.color = 'white';
          resultsInfo.textContent = 'No restaurants found for this zip code';
        }
      } catch (error) {
        resultsInfo.style.display = 'block';
        resultsInfo.style.backgroundColor = '#e74c3c';
        resultsInfo.style.color = 'white';
        resultsInfo.textContent = 'Error loading restaurants. Please try again.';
      }
    };

    document.getElementById('search').addEventListener('click', updateMap);
    document.getElementById('zip').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        updateMap();
      }
    });
  }
</script>

<script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg&callback=initMap&libraries=&v=weekly"
        async
></script>
</body>
</html>
