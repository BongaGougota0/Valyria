spring.application.name=v1

# includes validation errors in http responses.
# to exclude use value = never
server.error.include-binding-errors=always
server.error.include-message=always

# ==========================================
# R2DBC CONFIGURATION (Reactive)
# ==========================================
# R2DBC PostgreSQL connection
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/userkolekt
spring.r2dbc.username=postgres
spring.r2dbc.password=

# Schema initialization for R2DBC
#spring.sql.init.mode=always
# 'never' don't run schema.sql
 spring.sql.init.mode=never

# Continue on error (useful during development)
spring.sql.init.continue-on-error=false